<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parallel Archive | Paris Art Gallery Museum</title>
    <meta
      name="description"
      content="Parallel Archive is a Paris-based art gallery museum championing young independent artists from Paris, Berlin, and around the world."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="hero-bg" role="img" aria-label="Contemporary art installation background"></div>
    <div class="overlay"></div>
    <div class="center-emblem" aria-hidden="true">
      <span class="center-emblem-mark"></span>
      <span class="center-emblem-text">PA</span>
    </div>

    <header class="topbar">
      <div class="topbar-left">
        <a class="brand" href="#" aria-label="Parallel Archive home">
          <span class="brand-mark" aria-hidden="true"></span>
          <span class="brand-name">Parallel Archive</span>
        </a>
        <nav class="menu" aria-label="Main Navigation">
          <a href="#current-event" data-i18n="menuCurrentEvent">Current Event</a>
          <a href="#artists" data-i18n="menuArtists">Artists</a>
          <a href="#reservation" data-i18n="menuReservation">Reservation</a>
          <a href="#contact" data-i18n="menuContact">Contact</a>
        </nav>
      </div>

      <div class="language-switcher" aria-label="Language selector">
        <button class="lang-btn is-active" data-lang="en" type="button">EN</button>
        <button class="lang-btn" data-lang="fr" type="button">FR</button>
        <button class="lang-btn" data-lang="de" type="button">DE</button>
      </div>
    </header>

    <main class="hero-content">
      <p class="eyebrow" data-i18n="eyebrow">Paris Art Gallery Museum</p>
      <h1 data-i18n="title">Parallel Archive</h1>
      <p class="lead" data-i18n="lead">
        A playful museum for independent voices from Paris, Berlin, and beyond.
      </p>

      <div class="circle-board" aria-label="Gallery highlights">
        <article class="info-circle info-circle-large">
          <div class="orbit-text-wrap">
            <svg class="orbit-svg" viewBox="0 0 320 320" aria-hidden="true">
              <defs>
                <path id="aboutOrbitPath" d="M160,160 m-118,0 a118,118 0 1,1 236,0 a118,118 0 1,1 -236,0" />
              </defs>
              <text class="orbit-text">
                <textPath id="aboutOrbitText" href="#aboutOrbitPath" startOffset="50%" text-anchor="middle" data-i18n="aboutOrbit">
                  Young independent artists from Paris and Berlin.
                </textPath>
              </text>
            </svg>
            <p class="circle-label circle-center-label" data-i18n="aboutLabel">About Gallery</p>
          </div>
        </article>
        <article class="info-circle info-circle-small">
          <div class="orbit-text-wrap">
            <svg class="orbit-svg" viewBox="0 0 320 320" aria-hidden="true">
              <defs>
                <path id="eventOrbitPath" d="M160,160 m-118,0 a118,118 0 1,1 236,0 a118,118 0 1,1 -236,0" />
              </defs>
              <text class="orbit-text">
                <textPath id="eventOrbitText" href="#eventOrbitPath" startOffset="50%" text-anchor="middle" data-i18n="eventOrbit">
                  Soft Voltage: new media works in rotation.
                </textPath>
              </text>
            </svg>
            <p class="circle-label circle-center-label" data-i18n="eventLabel">Current Event</p>
          </div>
        </article>
      </div>
    </main>

    <section id="current-event" class="anchor"></section>
    <section id="artists" class="anchor"></section>
    <section id="reservation" class="anchor"></section>
    <section id="contact" class="anchor"></section>

    <script>
      const translations = {
        en: {
          menuCurrentEvent: "Current Event",
          menuArtists: "Artists",
          menuReservation: "Reservation",
          menuContact: "Contact",
          eyebrow: "Paris Art Gallery Museum",
          title: "Parallel Archive",
          lead: "A playful museum for independent voices from Paris, Berlin, and beyond.",
          aboutLabel: "About Gallery",
          aboutOrbit: "Young independent artists from Paris and Berlin.",
          eventLabel: "Current Event",
          eventOrbit: "Soft Voltage: new media works in rotation.",
        },
        fr: {
          menuCurrentEvent: "Exposition en cours",
          menuArtists: "Artistes",
          menuReservation: "Reservation",
          menuContact: "Contact",
          eyebrow: "Musee Galerie d'Art a Paris",
          title: "Parallel Archive",
          lead: "Un musee ludique pour les voix independantes de Paris, Berlin et d'ailleurs.",
          aboutLabel: "A propos de la galerie",
          aboutOrbit: "Jeunes artistes independants de Paris et Berlin.",
          eventLabel: "Exposition en cours",
          eventOrbit: "Soft Voltage: oeuvres new media en rotation.",
        },
        de: {
          menuCurrentEvent: "Aktuelle Ausstellung",
          menuArtists: "Kuenstler",
          menuReservation: "Reservierung",
          menuContact: "Kontakt",
          eyebrow: "Kunstgalerie-Museum in Paris",
          title: "Parallel Archive",
          lead: "Ein spielerisches Museum fuer unabhaengige Stimmen aus Paris, Berlin und darueber hinaus.",
          aboutLabel: "Ueber die Galerie",
          aboutOrbit: "Junge unabhaengige Kuenstler aus Paris und Berlin.",
          eventLabel: "Aktuelle Ausstellung",
          eventOrbit: "Soft Voltage: rotierende New-Media-Arbeiten.",
        },
      };

      const langButtons = document.querySelectorAll('.lang-btn');
      const translatable = document.querySelectorAll('[data-i18n]');

      function setLanguage(lang) {
        const dict = translations[lang];
        if (!dict) return;

        translatable.forEach((el) => {
          const key = el.dataset.i18n;
          if (dict[key]) el.textContent = dict[key];
        });

        langButtons.forEach((btn) => {
          btn.classList.toggle('is-active', btn.dataset.lang === lang);
        });

        document.documentElement.lang = lang;
      }

      langButtons.forEach((btn) => {
        btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
      });
    </script>
  </body>
</html>
